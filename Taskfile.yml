version: "3"

tasks:
  default:
    desc: List available tasks
    cmds:
      - task --list

  build:
    desc: Build the Python package and docs shell when present
    cmds:
      - |
        set -euo pipefail

        if [ -f pyproject.toml ]; then
          if command -v uv >/dev/null 2>&1; then
            uv build
          else
            python -m build
          fi
        fi

        if [ -f package.json ] && grep -q '"docs:build"' package.json; then
          if command -v bun >/dev/null 2>&1; then
            bun run docs:build
          else
            echo "bun is required to build docs" >&2
            exit 1
          fi
        fi

  test:
    desc: Run the primary test suite for the detected stack
    cmds:
      - |
        set -euo pipefail

        if [ -f pyproject.toml ]; then
          if [ ! -d tests ] || ! find tests -type f -name "test_*.py" | grep -q .; then
            echo "No test files found under tests/; skipping pytest."
            exit 0
          fi

          if command -v uv >/dev/null 2>&1; then
            uv run pytest
          else
            python -m pytest
          fi
          exit 0
        fi

        if [ -f package.json ] && grep -q '"test"' package.json; then
          bun test
          exit 0
        fi

        echo "No supported test command found" >&2
        exit 1

  lint:
    desc: Run linting for the detected stack
    cmds:
      - |
        set -euo pipefail

        if [ -f pyproject.toml ]; then
          if command -v uv >/dev/null 2>&1; then
            uv run ruff check .
          else
            python -m ruff check .
          fi
          exit 0
        fi

        if [ -f package.json ] && grep -q '"lint"' package.json; then
          bun run lint
          exit 0
        fi

        echo "No supported lint command found" >&2
        exit 1

  clean:
    desc: Remove generated artifacts
    cmds:
      - |
        set -euo pipefail

        rm -rf build dist .pytest_cache .ruff_cache .mypy_cache docs/.vitepress/dist
        find . -type d -name "__pycache__" -prune -exec rm -rf {} +
